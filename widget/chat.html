<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Онлайн-помощник</title>
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body>
    <main class="chat-root">
      <header class="chat-header">
        <div class="chat-title" id="chatTitle">Онлайн-помощник</div>
        <button id="closeBtn" type="button" class="close-btn" aria-label="Закрыть чат">×</button>
      </header>

      <section id="chatLog" class="chat-log"></section>

      <div id="approvalBar" class="approval-bar">
        <div id="approvalText" class="approval-text">Для продолжения нужно подтверждение действия.</div>
        <div class="approval-actions">
          <button id="approveBtn" type="button" class="approve-btn">Подтвердить</button>
          <button id="cancelBtn" type="button" class="cancel-btn">Отменить</button>
        </div>
      </div>

      <form id="chatForm" class="chat-input-row">
        <input id="userInput" type="text" autocomplete="off" placeholder="Напишите, что сделать на этой странице" />
        <button id="sendBtn" type="submit">Отправить</button>
      </form>
    </main>

    <script src="/static/chat.js"></script>
  </body>
</html>
